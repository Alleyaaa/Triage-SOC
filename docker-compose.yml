version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: soc-triage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc_password}
      POSTGRES_DB: ${POSTGRES_DB:-soc_triage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soc_user} -d ${POSTGRES_DB:-soc_triage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: soc-triage-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-soc_user}:${POSTGRES_PASSWORD:-soc_password}@postgres:5432/${POSTGRES_DB:-soc_triage}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5000/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: soc-triage-frontend
    restart: unless-stopped
    depends_on:
      api-server:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres_data:
